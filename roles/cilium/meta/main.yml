---
argument_specs:
  main:
    short_description: Install Cilium CLI and deploy the Cilium CNI
    options:
      apiserver_endpoint:
        description: Virtual ip-address configured on each master
        required: true

      cilium_tag:
        description: Cilium image tag (e.g. v1.19.2)
        required: true

      cilium_bgp:
        description: Enable Cilium BGP control plane
        type: bool
        default: false

      bpf_lb_algorithm:
        description: BPF lb algorithm
        default: maglev

      bpf_lb_mode:
        description: BPF lb mode
        default: hybrid

      cilium_export_pod_cidr:
        description: Export pod CIDR
        type: bool
        default: true

      cilium_gateway_api:
        description: Enable Cilium Gateway API support (installs experimental CRDs)
        type: bool
        default: true

      cilium_hubble:
        description: Enable Cilium Hubble
        type: bool
        default: true

      cilium_iface:
        description: The network interface used for when Cilium is enabled
        default: ~

      cilium_mode:
        description: Inner-node communication mode
        default: native
        choices:
          - native
          - routed

      cluster_cidr:
        description: Inner-cluster IP range
        default: 10.52.0.0/16

      cluster_domain:
        description: Cluster DNS domain (used for Hubble peer service)
        default: cluster.local

      enable_bpf_masquerade:
        description: Use IP masquerading
        type: bool
        default: true

      gateway_api_version:
        description: Gateway API CRD version from kubernetes-sigs/gateway-api (must match Cilium version compatibility)
        default: v1.1.0

      group_name_master:
        description: Name of the master group
        default: master

      kube_proxy_replacement:
        description: Replace the native kube-proxy with Cilium
        type: bool
        default: true
