---
- name: Create k3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Merge agent config overrides
  when: k3s_agent_config is defined
  ansible.builtin.set_fact:
    k3s_agent_config_base: >-
      {{ k3s_agent_config_base | combine(k3s_agent_config, recursive=true) }}

- name: Write config.yaml
  ansible.builtin.copy:
    content: "{{ k3s_agent_config_base | to_nice_yaml }}"
    dest: /etc/rancher/k3s/config.yaml
    mode: "0640"
  register: _k3s_config_result

- name: Deploy k3s-agent HTTP proxy config
  ansible.builtin.include_tasks: http_proxy.yml
  when: proxy_env is defined

- name: Install k3s-agent service unit
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ systemd_dir }}/k3s-agent.service"
    owner: root
    group: root
    mode: "0644"
  register: _k3s_service_unit

- name: Enable and start k3s-agent
  ansible.builtin.systemd:
    name: k3s-agent
    daemon_reload: true
    state: "{{ 'restarted' if (_k3s_config_result.changed or _k3s_service_unit.changed) else 'started' }}"
    enabled: true
